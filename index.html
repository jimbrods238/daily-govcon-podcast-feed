<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Daily GovCon Briefing</title>
  <meta name="description" content="Daily synthesis of federal contracting news and what it means for contractors.">
  <link rel="alternate" type="application/rss+xml" title="Daily GovCon Briefing" href="/feed.xml">
  <style>
    :root {
      --navy: #0C1018;
      --blue: #1A6FFF;
      --light: #C8DCFF;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--navy);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px;
      line-height: 1.55;
    }
    .brand {
      color: var(--blue);
      font-family: "Barlow Condensed", Impact, sans-serif;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 18px;
      margin-bottom: 8px;
    }
    h1 {
      font-family: "Barlow Condensed", Impact, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 72px;
      line-height: 1.0;
      margin: 0 0 24px;
    }
    h1 .accent { color: var(--blue); }
    p { color: var(--light); font-size: 18px; }
    a { color: var(--blue); }
    .links { margin-top: 32px; }
    .links a {
      display: inline-block;
      margin-right: 16px;
      padding: 12px 20px;
      border: 1px solid var(--blue);
      text-decoration: none;
      text-transform: uppercase;
      font-family: "Barlow Condensed", Impact, sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .links a:hover { background: var(--blue); color: var(--navy); }
    img { max-width: 280px; border-radius: 8px; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="brand">Weekday federal contracting intelligence</div>
  <h1>Daily <span class="accent">GovCon</span> Briefing</h1>
  <p>A daily synthesis of federal contracting news — acquisition policy, DoD and VA, federal AI policy — and what it means for contractors. Five to seven minutes. One voice. Weekdays.</p>
  <div class="links">
    <a href="/feed.xml">RSS Feed</a>
    <a href="https://podcasts.apple.com/">Apple Podcasts</a>
  </div>
  <img src="/cover.png" alt="Daily GovCon Briefing cover art">
</body>
</html>
